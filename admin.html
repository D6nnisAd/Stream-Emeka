<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Stream Africa</title>
    <meta name="robots" content="noindex, nofollow"> <!-- Admin should not be indexed -->

    <!-- Favicons -->
    <link rel="shortcut icon" href="assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/android-chrome-512x512.png">

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #0F1816;
            --card-bg: #1a2a27;
            --text-color: #ffffff;
            --accent-color: #4ade80;
            --font-main: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background-color: rgba(20, 32, 30, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            color: #fff !important;
        }

        .btn-logout {
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            border-radius: 50px;
            padding: 5px 20px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: #fff;
        }

        /* Main Content */
        .admin-container {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .section-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 20px;
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .settings-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .form-label {
            color: #d1d5db;
            font-weight: 500;
            margin-bottom: 10px;
        }

        .form-control {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            padding: 12px 15px;
            border-radius: 8px;
        }

        .form-control:focus {
            background-color: rgba(0, 0, 0, 0.3);
            border-color: var(--accent-color);
            color: #fff;
            box-shadow: 0 0 0 0.25rem rgba(74, 222, 128, 0.25);
        }

        .form-text {
            color: #9ca3af;
            font-size: 0.85rem;
        }

        .btn-save {
            background-color: var(--accent-color);
            color: #0F1816;
            font-weight: 600;
            padding: 12px 30px;
            border-radius: 50px;
            border: none;
            margin-top: 20px;
            width: 100%;
            transition: transform 0.2s;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            background-color: #22c55e;
        }

        /* Modal Styling */
        .modal-content {
            background-color: var(--card-bg);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-close {
            filter: invert(1) grayscale(100%) brightness(200%);
        }

        /* Toast */
        .toast {
            background-color: var(--card-bg);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg d-none" id="adminNavbar">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fa-solid fa-shield-halved me-2"></i> Stream Admin
            </a>
            <button class="btn btn-logout" id="logoutBtn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="admin-container d-none" id="adminContent">
        <h2 class="section-title">Payment & Redirect Settings</h2>
        
        <div class="settings-card">
            <form id="settingsForm">
                <!-- Paystack Key -->
                <div class="mb-4">
                    <label for="paystackKey" class="form-label">Paystack Public Key</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white"><i class="fa-solid fa-key"></i></span>
                        <input type="text" class="form-control" id="paystackKey" placeholder="pk_test_xxxxxxxxxxxxxxxxxxxx" required>
                    </div>
                    <div class="form-text">This key is used to process payments on the package page.</div>
                </div>

                <!-- Global Link -->
                <div class="mb-4">
                    <label for="globalLink" class="form-label">Global Redirect Link</label>
                    <div class="input-group">
                        <span class="input-group-text bg-dark border-secondary text-white"><i class="fa-solid fa-link"></i></span>
                        <input type="url" class="form-control" id="globalLink" placeholder="https://t.me/your_channel" required>
                    </div>
                    <div class="form-text">Users will be redirected here after payment and when clicking "Support Team".</div>
                </div>

                <button type="submit" class="btn-save">
                    <i class="fa-solid fa-floppy-disk me-2"></i> Save Changes
                </button>
            </form>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Admin Login</h5>
                </div>
                <div class="modal-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="adminEmail" class="form-label">Email address</label>
                            <input type="email" class="form-control" id="adminEmail" required>
                        </div>
                        <div class="mb-3">
                            <label for="adminPassword" class="form-label">Password</label>
                            <input type="password" class="form-control" id="adminPassword" required>
                        </div>
                        <div id="loginError" class="text-danger small mb-3 d-none">Invalid email or password.</div>
                        <button type="submit" class="btn btn-success w-100">Login</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="toast-header bg-success text-white">
                <strong class="me-auto">Success</strong>
                <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
            <div class="toast-body">
                Settings saved successfully!
            </div>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Firebase Logic -->
    <script type="module">
        import { auth, db } from './firebase-init.js';
        import { signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const loginModal = new bootstrap.Modal(document.getElementById('loginModal'));
        const toast = new bootstrap.Toast(document.getElementById('liveToast'));
        
        // Auth State Listener
        onAuthStateChanged(auth, (user) => {
            const adminNavbar = document.getElementById('adminNavbar');
            const adminContent = document.getElementById('adminContent');

            if (user) {
                loginModal.hide();
                adminNavbar.classList.remove('d-none');
                adminContent.classList.remove('d-none');
                loadSettings();
            } else {
                adminNavbar.classList.add('d-none');
                adminContent.classList.add('d-none');
                loginModal.show();
            }
        });

        // Login Handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const password = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('loginError');

            try {
                await signInWithEmailAndPassword(auth, email, password);
                errorDiv.classList.add('d-none');
            } catch (error) {
                console.error(error);
                errorDiv.textContent = error.message;
                errorDiv.classList.remove('d-none');
            }
        });

        // Logout Handler
        document.getElementById('logoutBtn').addEventListener('click', () => {
            signOut(auth);
        });

        // Load Settings
        async function loadSettings() {
            try {
                const docRef = doc(db, "admin_settings", "config");
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('paystackKey').value = data.paystackPublicKey || '';
                    document.getElementById('globalLink').value = data.globalLink || '';
                }
            } catch (error) {
                console.error("Error loading settings:", error);
                alert("Failed to load settings. Check console for details.");
            }
        }

        // Save Settings
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const paystackKey = document.getElementById('paystackKey').value;
            const globalLink = document.getElementById('globalLink').value;
            const btn = e.target.querySelector('button');

            // Loading state
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Saving...';
            btn.disabled = true;

            try {
                await setDoc(doc(db, "admin_settings", "config"), {
                    paystackPublicKey: paystackKey,
                    globalLink: globalLink
                });
                toast.show();
            } catch (error) {
                console.error("Error saving settings:", error);
                alert("Failed to save settings: " + error.message);
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
