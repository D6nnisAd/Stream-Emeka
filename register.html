<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Stream Africa</title>
    <meta name="robots" content="noindex, follow"> <!-- Registration page usually shouldn't be indexed for content, but following links is okay. -->

    <!-- Favicons -->
    <link rel="shortcut icon" href="assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/favicon/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="192x192" href="assets/favicon/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="assets/favicon/android-chrome-512x512.png">

    <!-- Google Fonts: Poppins -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --bg-color: #14201E;
            --text-color: #ffffff;
            --font-main: 'Poppins', sans-serif;
            --accent-color: #4ade80;
        }

        body {
            font-family: var(--font-main);
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
        }

        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            /* Cardless design: No background, border, or shadow on the container itself */
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container img {
            height: 50px;
            width: auto;
        }

        .page-title {
            font-size: 2rem;
            font-weight: 600;
            margin-bottom: 10px;
            text-align: center;
        }

        .page-subtitle {
            color: #9ca3af;
            text-align: center;
            margin-bottom: 40px;
            font-size: 1rem;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
            color: #d1d5db;
            font-size: 0.95rem;
        }

        .form-control {
            background-color: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            color: #ffffff;
            padding: 12px 0;
            font-size: 1rem;
            transition: border-color 0.3s ease;
        }

        .form-control:focus {
            background-color: transparent;
            border-color: var(--accent-color);
            box-shadow: none;
            color: #ffffff;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .btn-register {
            background-color: #ffffff;
            color: #14201E;
            border: none;
            border-radius: 50px;
            padding: 15px;
            font-weight: 600;
            width: 100%;
            margin-top: 30px;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-register:hover {
            background-color: #f0f0f0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        .login-link {
            text-align: center;
            margin-top: 25px;
            color: #9ca3af;
            font-size: 0.95rem;
        }

        .login-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: 500;
            margin-left: 5px;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        /* Input Group spacing */
        .mb-4-custom {
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <!-- Logo -->
        <div class="logo-container">
            <a href="index.html">
                <img src="assets/logo.svg" alt="Stream Logo">
            </a>
        </div>

        <!-- Header -->
        <h1 class="page-title">Create Your Account</h1>
        <p class="page-subtitle">Join the Stream community and start your journey.</p>

        <!-- Form -->
        <form action="package.html" method="GET">
            <!-- Full Name -->
            <div class="mb-4-custom">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" placeholder="Enter your full name" required>
            </div>

            <!-- Username -->
            <div class="mb-4-custom">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" placeholder="Choose a username" required>
            </div>

            <!-- Email -->
            <div class="mb-4-custom">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <!-- Password -->
            <div class="mb-4-custom">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" placeholder="Create a password" required>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn-register">Create account</button>

            <!-- Login Link -->
            <div class="login-link">
                Already have an account? <a href="#">Log In</a>
            </div>
        </form>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
